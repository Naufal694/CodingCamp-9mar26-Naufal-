<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WAKTU SEGALANYA</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <button id="theme-toggle" class="theme-switch">🌙 switch to mode</button>

  <main class="dashboard">
    <section class="greeting-section">
      <div class="greeting-container">
        <div class="greeting-message">
          <span id="greeting-text">Good morning</span>, 
          <span id="user-name" contenteditable="true" title="Klik untuk ganti nama">guys</span>
        </div>
        <div class="current-time">12:00 AM</div>
        <div class="current-date">Monday, January 1, 2024</div>
      </div>
    </section>

  <section class="timer-section">
      <div class="timer-container">
        <h2>Focus Timer</h2>
        
        <div class="timer-display">25:00</div>
        
        <div class="timer-controls">
          <button class="btn-start">Start</button>
          <button class="btn-stop">Stop</button>
          <button class="btn-reset">Reset</button>
        </div>

        <div class="time-settings" style="margin-top: 20px; display: flex; gap: 10px; justify-content: center;">
          <input type="number" id="custom-minutes" value="25" min="1" max="120" style="width: 70px; padding: 8px; border-radius: 6px; border: 1px solid #6c5ce7; text-align: center; font-size: 16px; outline: none;">
          <button id="btn-set-time" style="background-color: #6c5ce7; color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold;">Set Waktu</button>
        </div>
      </div>
    </section>
    <section class="task-section">
      <div class="task-container">
        <h2>Tasks</h2>
        <div class="task-input-section">
          <input type="text" class="task-input" placeholder="Add a new task..." aria-label="New task">
          <button class="btn-add-task">Add</button>
        </div>
        <div id="task-error" style="color: #ff4757; font-size: 0.8rem; margin-bottom: 10px;"></div>
        <ul class="task-list"></ul>
      </div>
    </section>

    <section class="links-section">
      <div class="links-container">
        <h2>Quick Links</h2>
        <div class="link-input-section">
          <input type="text" class="link-name-input" placeholder="Link name" aria-label="Link name">
          <input type="url" class="link-url-input" placeholder="https://example.com" aria-label="Link URL">
          <button class="btn-add-link">Add Link</button>
        </div>
        <div class="links-grid"></div>
      </div>
    </section>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
